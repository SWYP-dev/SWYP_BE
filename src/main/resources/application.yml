server:
  port: 8080

spring:
  application:
    name: server
  jpa:
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: info
    com.chwihap.server: debug

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:3600000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI}
