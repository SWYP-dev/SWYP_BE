server:
  port: 8080

# 공공데이터포털(data.go.kr) 채용정보 API 연동
data-go-kr:
  base-url: https://apis.data.go.kr/1051000/recruitment
  service-key: ${DATA_GO_KR_SERVICE_KEY:}
  sync:
    num-of-rows: 100
    max-pages: 20

spring:
  application:
    name: server
  # HTTP multipart 파일 업로드 크기 제한
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  jpa:
    hibernate:
      ddl-auto: validate

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: info
    com.chwihap.server: debug

app:
  feed:
    # 공고 썸네일이 없을 때 기업 로고 영역에 노출할 서비스 기본 로고 URL
    # S3 버킷(swyp-prod-.../images/)에 공개 정책으로 올려둔 이미지. 커스텀 도메인 연결 전까지는 S3 URL을 그대로 사용한다.
    default-thumbnail-url: ${FEED_DEFAULT_THUMBNAIL_URL:https://swyp-prod-177989594187-ap-southeast-2-an.s3.ap-southeast-2.amazonaws.com/images/default-logo.png}
  cors:
    # 콤마로 구분된 허용 origin 목록 (배포 환경에서는 CORS_ALLOWED_ORIGINS 환경변수로 재정의)
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://chwihap.com,https://www.chwihap.com}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:3600000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI}
