server:
  port: 8080

app:
  # TODO: 인증 기능 머지 후 제거. 그 전까지 모든 요청을 이 유저로 처리한다.
  test-user-id: 1

# 공공데이터포털(data.go.kr) 채용정보 API 연동
data-go-kr:
  base-url: https://apis.data.go.kr/1051000/recruitment
  service-key: ${DATA_GO_KR_SERVICE_KEY:}
  sync:
    num-of-rows: 100
    max-pages: 20

spring:
  application:
    name: server
  # HTTP multipart 파일 업로드 크기 제한
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  jpa:
    hibernate:
      ddl-auto: validate

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: info
    com.chwihap.server: debug
