app:
  # AWS S3 스토리지 설정
  storage:
    s3:
      bucket: ${AWS_S3_BUCKET}
      region: ${AWS_REGION}
      # 실제 파일 크기를 비지니스 로직에서 검증
      presigned-url-duration: 15m
      max-file-size: 10MB
      account-storage-limit: 100MB

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # TODO: 정식 오픈(실사용자 데이터 발생) 시점에 validate로 전환 + Flyway 등 마이그레이션 도구 도입 필요.
      # 그 전까지는 스키마가 계속 바뀌는 개발 단계라 update로 자동 반영.
      ddl-auto: update
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
