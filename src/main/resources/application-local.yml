spring:
  datasource:
    url: jdbc:mysql://localhost:3306/chwihap
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-jwt-secret-key-please-change-this-1234567890}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:3600000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}
  kakao:
    client-id: ${KAKAO_CLIENT_ID:local-dev-kakao-client-id}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    allowed-redirect-uris: ${KAKAO_ALLOWED_REDIRECT_URIS:http://localhost:8080/api/v1/auth/kakao,http://localhost:3000/auth/kakao/callback}
  storage:
    s3:
      bucket: ${AWS_S3_BUCKET:local-dev-bucket}
      region: ${AWS_REGION:ap-southeast-2}
      presigned-url-duration: 15m
      max-file-size: 10MB
      account-storage-limit: 100MB
