name: Deploy to EC2 (blue/green)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-southeast-2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_URI: ${{ secrets.ECR_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_URI:$IMAGE_TAG" -t "$ECR_URI:latest" .
          docker push "$ECR_URI:$IMAGE_TAG"
          docker push "$ECR_URI:latest"

      - name: Copy deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker/,scripts/"
          target: "/home/ubuntu/app"
          strip_components: 0

      - name: Run deploy script on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_URI,IMAGE_TAG
          script: |
            chmod +x /home/ubuntu/app/scripts/deploy.sh
            /home/ubuntu/app/scripts/deploy.sh
        env:
          ECR_URI: ${{ secrets.ECR_URI }}
          IMAGE_TAG: ${{ github.sha }}
